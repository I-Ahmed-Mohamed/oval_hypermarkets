<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>دليل لوكيشنات المناديب</title>
  <meta name="description" content="دليل سريع للمناديب للبحث عن الفروع وفتح اللوكيشن مباشرة." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div class="bg"></div>

  <header class="topbar">
    <div class="brand">
      <span class="logo">📍</span>
      <div>
        <strong>دليل اللوكيشنات</strong>
        <small>للمندوبين</small>
      </div>
    </div>

    <button class="theme-btn" id="themeBtn" type="button">☾</button>
  </header>

  <main class="app">
    <section class="hero">
      <div class="developer-badge">
        <button id="devImgBtn" type="button" class="dev-img-btn" title="عرض الصورة">
          <img src="imag/Ahmed.jpeg" alt="Eng. Ahmed Mohamed" class="dev-img">
        </button>
        <span>تم التطوير بواسطة <strong>المهندس أحمد محمد</strong></span>
      </div>
      <div>
        <span class="pill">فتح اللوكيشن بضغطة</span>
        <h1>كل الفروع قدام المندوب بسرعة</h1>
        <p>ابحث باسم العميل أو الفرع أو الكود أو المنطقة، وافتح Google Maps مباشرة.</p>
      </div>

      <div class="stats">
        <div>
          <strong id="companyCount">0</strong>
          <span>عميل</span>
        </div>
        <div>
          <strong id="branchCount">0</strong>
          <span>فرع</span>
        </div>
        <div>
          <strong id="resultCount">0</strong>
          <span>نتيجة</span>
        </div>
      </div>
    </section>

    <section class="search-card">
      <div class="search-box">
        <span>⌕</span>
        <input id="searchInput" type="search" placeholder="ابحث: أمازون، AZ001، كازيون، التجمع..." autocomplete="off">
        <button id="clearBtn" type="button">مسح</button>
      </div>

      <div class="quick-filters" id="quickFilters">
        <button class="active" data-filter="all" type="button">الكل</button>
        <button data-filter="recent" type="button">آخر فتح</button>
        <button data-filter="favorites" type="button">المفضلة</button>
      </div>
    </section>

    <section class="tools-row">
      <button id="copySummary" type="button">نسخ ملخص</button>
      <button id="openAllVisible" type="button">أول نتيجة</button>
      <button id="resetData" type="button">إظهار الكل</button>
    </section>

    <section class="companies" id="companies"></section>

    <section class="empty" id="empty" hidden>
      <strong>مفيش نتائج</strong>
      <p>جرّب اسم فرع أو كود أو منطقة تانية.</p>
    </section>
  </main>


  <div class="image-modal" id="imageModal">
    <button class="close-modal" id="closeModalBtn" type="button">&times;</button>
    <img src="imag/Ahmed.jpeg" alt="Eng. Ahmed Mohamed">
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
